let cart = [];

function renderProducts() {
  const container = document.getElementById("products");
  container.innerHTML = "";

  products.forEach(p => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${p.image}">
      <h3>${p.name}</h3>
      <p>R ${p.price}</p>
      <select id="size-${p.id}">
        <option value="">Select Size</option>
        ${p.sizes.map(s => `<option value="${s}">UK ${s}</option>`).join("")}
      </select>
      <button onclick="addToCart(${p.id})">Add to Cart</button>
    `;

    container.appendChild(div);
  });
}

function addToCart(id) {
  const product = products.find(p => p.id === id);
  const size = document.getElementById(`size-${id}`).value;

  if (!size) {
    alert("Select size first");
    return;
  }

  cart.push({ ...product, size });
  renderCart();
}

function renderCart() {
  const container = document.getElementById("cartItems");
  const totalEl = document.getElementById("total");

  container.innerHTML = "";
  let total = 0;

  cart.forEach((item, i) => {
    total += item.price;
    container.innerHTML += `<p>${i+1}. ${item.name} (Size ${item.size}) - R ${item.price}</p>`;
  });

  totalEl.innerText = "Total: R " + total;
  updateWhatsApp(total);
}

function updateWhatsApp(total) {
  const customer = document.getElementById("customerNumber").value;

  let message = "Hello, I would like to order:%0A%0A";

  cart.forEach((item, i) => {
    message += `${i+1}. ${item.name} (Size ${item.size}) - R ${item.price}%0A`;
  });

  message += `%0ATotal: R ${total}%0A`;

  if (customer) {
    message += `%0ACustomer Number: ${customer}%0A`;
  }

  const link = `https://wa.me/${WHATSAPP_NUMBER}?text=${message}`;
  document.getElementById("checkoutBtn").href = link;
}

renderProducts();
